services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockmaster
      POSTGRES_USER: stockmaster
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockmaster_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stockmaster:${DB_PASSWORD:-stockmaster_secret}@postgres:5432/stockmaster
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
